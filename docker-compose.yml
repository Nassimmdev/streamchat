services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - CORS_ORIGIN=http://localhost
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=
    ports:
      - "80:80"
    depends_on:
      - backend
